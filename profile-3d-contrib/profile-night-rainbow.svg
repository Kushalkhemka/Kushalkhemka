<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">3D contribution graph placeholder</title>
  <desc id="desc">Placeholder shown until GitHub Actions generates the live 3D contribution graph.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1200" y1="0" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/>
      <stop offset=".5" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="360" rx="28" fill="url(#bg)"/>
  <g opacity=".28">
    <path d="M0 72H1200M0 144H1200M0 216H1200M0 288H1200" stroke="#e0f2fe"/>
    <path d="M120 0V360M240 0V360M360 0V360M480 0V360M600 0V360M720 0V360M840 0V360M960 0V360M1080 0V360" stroke="#e0f2fe"/>
  </g>
  <text x="600" y="154" text-anchor="middle" fill="#f8fafc" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="34" font-weight="800">3D CONTRIBUTION GRAPH</text>
  <text x="600" y="203" text-anchor="middle" fill="#ccfbf1" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" font-weight="600">This placeholder is replaced by GitHub Actions after the first workflow run.</text>
</svg>
