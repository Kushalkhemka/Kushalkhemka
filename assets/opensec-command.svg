<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">OpenSec security intelligence dashboard</title>
  <desc id="desc">Animated OpenSec dashboard showing repository scanning, agent triage, vulnerability reasoning, and patch generation.</desc>
  <style>
    .panel { fill: #07111f; stroke: #164e63; stroke-width: 1.4; }
    .card { fill: #0b1220; stroke: #2563eb; stroke-width: 1.2; }
    .title { fill: #f8fafc; font: 800 30px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .subtitle { fill: #bae6fd; font: 700 15px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .label { fill: #94a3b8; font: 700 13px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .small { fill: #cbd5e1; font: 600 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .tiny { fill: #64748b; font: 600 11px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .metric { fill: #f8fafc; font: 800 24px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .accent { fill: #2dd4bf; }
    .blue { fill: #60a5fa; }
    .purple { fill: #a78bfa; }
    .green { fill: #22c55e; }
    .line { stroke: #2dd4bf; stroke-width: 2; stroke-linecap: round; stroke-dasharray: 8 12; animation: dash 3.2s linear infinite; }
    .pulse { animation: pulse 2.2s ease-in-out infinite; transform-origin: center; }
    .pulse2 { animation: pulse 2.2s ease-in-out infinite .55s; transform-origin: center; }
    .pulse3 { animation: pulse 2.2s ease-in-out infinite 1.1s; transform-origin: center; }
    .scan { fill: url(#scan); animation: scan 4s ease-in-out infinite; }
    .bar1 { animation: bar 2.8s ease-in-out infinite; transform-origin: bottom; }
    .bar2 { animation: bar 2.8s ease-in-out infinite .35s; transform-origin: bottom; }
    .bar3 { animation: bar 2.8s ease-in-out infinite .7s; transform-origin: bottom; }
    .blink { animation: blink 1.4s steps(2, start) infinite; }
    @keyframes dash { to { stroke-dashoffset: -80; } }
    @keyframes pulse { 0%, 100% { opacity: .55; transform: scale(.96); } 50% { opacity: 1; transform: scale(1.06); } }
    @keyframes scan { 0%, 100% { transform: translateX(0); opacity: .2; } 50% { transform: translateX(450px); opacity: .9; } }
    @keyframes bar { 0%, 100% { transform: scaleY(.45); opacity: .65; } 50% { transform: scaleY(1); opacity: 1; } }
    @keyframes blink { 50% { opacity: .25; } }
  </style>
  <defs>
    <linearGradient id="bg" x1="0" x2="1200" y1="0" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/>
      <stop offset=".48" stop-color="#082f49"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="scan" x1="0" x2="110" y1="0" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2dd4bf" stop-opacity="0"/>
      <stop offset=".5" stop-color="#2dd4bf" stop-opacity=".75"/>
      <stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="420" rx="30" fill="url(#bg)"/>
  <g opacity=".28">
    <path d="M0 70H1200M0 140H1200M0 210H1200M0 280H1200M0 350H1200" stroke="#93c5fd"/>
    <path d="M100 0V420M200 0V420M300 0V420M400 0V420M500 0V420M600 0V420M700 0V420M800 0V420M900 0V420M1000 0V420M1100 0V420" stroke="#93c5fd"/>
  </g>

  <rect x="46" y="34" width="1108" height="344" rx="24" class="panel"/>

  <g transform="translate(78 62)">
    <rect width="470" height="86" rx="16" class="card"/>
    <text x="24" y="36" class="title">OPENSEC COMMAND</text>
    <text x="25" y="64" class="subtitle">repository intelligence -> agent triage -> patches</text>
    <rect x="25" y="72" width="250" height="5" rx="3" fill="#164e63"/>
    <rect class="scan" x="25" y="72" width="88" height="5" rx="3"/>
  </g>

  <g transform="translate(78 176)">
    <rect width="218" height="132" rx="16" class="card"/>
    <text x="22" y="34" class="label">AEGIS</text>
    <text x="22" y="70" class="metric">SAST + RAG</text>
    <text x="22" y="98" class="small">flow reasoning</text>
    <text x="22" y="116" class="tiny">exploitability + remediation</text>
    <circle cx="180" cy="34" r="9" class="accent pulse" filter="url(#glow)"/>
  </g>

  <g transform="translate(330 176)">
    <rect width="218" height="132" rx="16" class="card"/>
    <text x="22" y="34" class="label">TRACEVUL</text>
    <text x="22" y="70" class="metric">94,759</text>
    <text x="22" y="98" class="small">canonical records</text>
    <text x="22" y="116" class="tiny">CVE -> code -> patch evidence</text>
    <circle cx="180" cy="34" r="9" class="blue pulse2" filter="url(#glow)"/>
  </g>

  <g transform="translate(600 62)">
    <rect width="238" height="246" rx="16" class="card"/>
    <text x="24" y="36" class="label">AGENT PIPELINE</text>
    <circle cx="64" cy="88" r="24" fill="#0f766e" opacity=".36"/>
    <circle cx="64" cy="88" r="11" class="accent pulse" filter="url(#glow)"/>
    <circle cx="176" cy="126" r="24" fill="#2563eb" opacity=".36"/>
    <circle cx="176" cy="126" r="11" class="blue pulse2" filter="url(#glow)"/>
    <circle cx="92" cy="180" r="24" fill="#7c3aed" opacity=".36"/>
    <circle cx="92" cy="180" r="11" class="purple pulse3" filter="url(#glow)"/>
    <path d="M83 94C111 102 137 112 157 121" class="line"/>
    <path d="M157 137C137 152 116 165 103 174" class="line"/>
    <text x="24" y="224" class="small">retrieve . reason . validate</text>
  </g>

  <g transform="translate(878 62)">
    <rect width="228" height="246" rx="16" class="card"/>
    <text x="24" y="36" class="label">LIVE SIGNALS</text>
    <text x="24" y="70" class="small">security + ml + backend</text>
    <rect x="35" y="128" width="28" height="82" rx="7" class="accent bar1"/>
    <rect x="82" y="104" width="28" height="106" rx="7" class="blue bar2"/>
    <rect x="129" y="146" width="28" height="64" rx="7" class="purple bar3"/>
    <rect x="176" y="118" width="28" height="92" rx="7" class="green bar2"/>
    <text x="24" y="102" class="metric">AI + SEC</text>
    <text x="24" y="228" class="tiny">evidence-backed systems</text>
  </g>

  <g transform="translate(78 346)">
    <circle cx="0" cy="0" r="5" class="accent blink"/>
    <text x="16" y="5" class="tiny">status: building agentic vulnerability intelligence</text>
  </g>
</svg>
